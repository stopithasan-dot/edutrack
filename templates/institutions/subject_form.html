{% extends 'dashboard/admin_dashboard.html' %}
{% load crispy_forms_tags %}
{% block title %}Add Subject | EduTrack{% endblock %}
{% block dashboard_content %}
<div class="pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h2">Add New Subject</h1>
</div>
<div class="card p-4 col-lg-8">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save Subject</button>
            <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
