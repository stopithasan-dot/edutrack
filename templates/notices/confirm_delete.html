{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Delete Notice | EduTrack{% endblock %}

{% block dashboard_content %}
<div class="pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h2 text-danger">Confirm Deletion</h1>
</div>
<div class="card p-4 border-danger">
    <p>Are you sure you want to delete the notice "<strong>{{ object.title }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'notice_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
